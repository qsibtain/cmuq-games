<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personality Quiz | CMU-Q Weekly Games</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --red: #C41230;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container { max-width: 560px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 20px;
  }

  header .back {
    display: inline-block;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  header .back:hover { color: var(--red); }
  header h1 { font-size: 1.5rem; font-weight: 800; }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Progress dots */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.active { background: var(--red); transform: scale(1.2); }
  .dot.done { background: var(--text); }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 20px;
    text-align: center;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
    line-height: 1.35;
    text-align: center;
  }

  .option:hover { border-color: #bbb; background: #f9f9f9; }

  .option.selected {
    border-color: var(--red);
    background: #fef2f2;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  .option.selected { animation: pulse 0.2s ease; }

  /* Result card */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeIn 0.5s ease;
  }

  .result-card.active { display: block; }

  .result-emoji {
    font-size: 3.5rem;
    margin-bottom: 12px;
  }

  .result-type {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .result-desc {
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.55;
    margin-bottom: 24px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .results-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #f0f0f0; }
  .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn.primary:hover { background: #2a2a4e; }

  @media (max-width: 480px) {
    .question-card { padding: 20px; }
    .option { padding: 12px 14px; font-size: 0.85rem; }
    .result-card { padding: 28px 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="index.html" class="back">&larr; All Games</a>
    <h1 id="quiz-title"></h1>
    <p id="quiz-subtitle"></p>
  </header>

  <div class="progress-dots" id="progress-dots"></div>
  <div id="question-area"></div>

  <div class="result-card" id="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-type" id="result-type"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="results-actions">
      <button class="btn primary" onclick="shareResult()">Share Result</button>
      <button class="btn" onclick="init()">Retake Quiz</button>
    </div>
    <div id="leaderboard"></div>
  </div>
</div>
<script src="leaderboard.js"></script>

<script>
/* ============================================================
   WEEKLY FEEDBACK — Paste notes here before requesting updates

   Difficulty: (too easy | just right | too hard)
   Notes:
   -
   ============================================================ */

/* ============================================================
   WEEKLY PUZZLE CONFIG — Edit this section each week

   title / subtitle: displayed in the header
   questions: array of { q, options: [{text, type}] }
     - Each option maps to a 'type' key (e.g. "A", "B", "C", "D")
   results: object keyed by type
     - emoji, title, description for each result type
   ============================================================ */
const PUZZLE_DATE = '2026-04-22';
const QUIZ = {
  title: "What Type of Developer Are You?",
  subtitle: "Answer 6 questions to find out",
  questions: [
    {
      q: "You're assigned a group coding project. What's your first move?",
      options: [
        { text: "Set up the repo, create issues, and write a project plan", type: "A" },
        { text: "Sketch the UI and think about the user experience", type: "B" },
        { text: "Dive straight into coding the core algorithm", type: "C" },
        { text: "Research the best libraries and frameworks to use", type: "D" },
      ]
    },
    {
      q: "A bug is found in production. How do you react?",
      options: [
        { text: "Check the logs and trace it systematically", type: "A" },
        { text: "Ask the team if anyone has seen this before", type: "B" },
        { text: "Start adding print statements everywhere", type: "C" },
        { text: "Search Stack Overflow and documentation first", type: "D" },
      ]
    },
    {
      q: "What's your ideal coding environment?",
      options: [
        { text: "Two monitors, dark theme, everything customized", type: "A" },
        { text: "A collaborative space where I can pair program", type: "B" },
        { text: "Anywhere with good Wi-Fi and karak", type: "C" },
        { text: "A quiet room with zero distractions", type: "D" },
      ]
    },
    {
      q: "Which elective sounds most interesting?",
      options: [
        { text: "Systems programming", type: "A" },
        { text: "Human-computer interaction", type: "B" },
        { text: "Machine learning", type: "C" },
        { text: "Software architecture", type: "D" },
      ]
    },
    {
      q: "How do you document your code?",
      options: [
        { text: "Detailed README, inline comments, and a wiki", type: "A" },
        { text: "Just enough so my teammates understand it", type: "B" },
        { text: "My code is self-documenting (I hope)", type: "C" },
        { text: "I write documentation after the code works", type: "D" },
      ]
    },
    {
      q: "What motivates you most in a project?",
      options: [
        { text: "Solving a technically challenging problem", type: "A" },
        { text: "Building something people will actually use", type: "B" },
        { text: "Learning a new technology or technique", type: "C" },
        { text: "Creating clean, elegant architecture", type: "D" },
      ]
    },
  ],
  results: {
    A: {
      emoji: "🔧",
      title: "The Systems Thinker",
      description: "You love structure, efficiency, and understanding how things work under the hood. You're the one debugging memory leaks at 2 AM because you know the system depends on it. Reliable, methodical, and deeply technical."
    },
    B: {
      emoji: "🤝",
      title: "The People's Developer",
      description: "Code is a means to an end for you — and that end is making people's lives better. You think about the user first, communicate well with your team, and bridge the gap between tech and the real world."
    },
    C: {
      emoji: "⚡",
      title: "The Hacker",
      description: "Move fast, break things, fix them, repeat. You're driven by curiosity and love experimenting with new tools and ideas. Your prototypes are legendary, even if your git history is... creative."
    },
    D: {
      emoji: "🏛️",
      title: "The Architect",
      description: "You see the big picture. Before writing a line of code, you've already mapped out the entire system in your head. Clean abstractions, good patterns, and maintainable code are your north star."
    }
  }
};
/* ============================================================ */

let currentQ = 0;
let answers = []; // array of type strings

function init() {
  currentQ = 0;
  answers = [];
  document.getElementById('quiz-title').textContent = QUIZ.title;
  document.getElementById('quiz-subtitle').textContent = QUIZ.subtitle;
  document.getElementById('result-card').classList.remove('active');
  renderDots();
  renderQuestion();
}

function renderDots() {
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  for (let i = 0; i < QUIZ.questions.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i === currentQ) dot.classList.add('active');
    else if (i < currentQ) dot.classList.add('done');
    dots.appendChild(dot);
  }
}

function renderQuestion() {
  const area = document.getElementById('question-area');
  const q = QUIZ.questions[currentQ];

  let html = '<div class="question-card">';
  html += '<div class="question-text">' + q.q + '</div>';
  html += '<div class="options">';

  q.options.forEach((opt, i) => {
    html += '<div class="option" onclick="selectAnswer(' + i + ')" id="opt-' + i + '">';
    html += opt.text;
    html += '</div>';
  });

  html += '</div></div>';
  area.innerHTML = html;
}

function selectAnswer(idx) {
  const q = QUIZ.questions[currentQ];
  answers.push(q.options[idx].type);

  // Highlight selected
  document.getElementById('opt-' + idx).classList.add('selected');

  // Disable all options
  q.options.forEach((_, i) => {
    document.getElementById('opt-' + i).style.pointerEvents = 'none';
  });

  // Auto-advance after a short delay
  setTimeout(() => {
    currentQ++;

    if (currentQ >= QUIZ.questions.length) {
      showResult();
    } else {
      renderDots();
      renderQuestion();
    }
  }, 500);
}

function showResult() {
  document.getElementById('question-area').innerHTML = '';
  document.getElementById('progress-dots').innerHTML = '';

  // Tally types
  const counts = {};
  for (const t of answers) {
    counts[t] = (counts[t] || 0) + 1;
  }

  // Find the type with the most votes
  let maxType = Object.keys(counts)[0];
  for (const [type, count] of Object.entries(counts)) {
    if (count > counts[maxType]) maxType = type;
  }

  const result = QUIZ.results[maxType];
  document.getElementById('result-emoji').textContent = result.emoji;
  document.getElementById('result-type').textContent = result.title;
  document.getElementById('result-desc').textContent = result.description;
  document.getElementById('result-card').classList.add('active');

  // Leaderboard (personality = distribution mode, not ranking)
  Leaderboard.submit({ game: 'personality', date: PUZZLE_DATE, score: 0, metric: maxType, display: result.title });
  Leaderboard.show('leaderboard', 'personality', PUZZLE_DATE);
}

function shareResult() {
  // Find result type
  const counts = {};
  for (const t of answers) {
    counts[t] = (counts[t] || 0) + 1;
  }
  let maxType = Object.keys(counts)[0];
  for (const [type, count] of Object.entries(counts)) {
    if (count > counts[maxType]) maxType = type;
  }

  const result = QUIZ.results[maxType];
  const text = 'CMU-Q Personality Quiz ' + PUZZLE_DATE + '\n' + result.emoji + ' I got: ' + result.title + '!\nTake the quiz: ';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn.primary');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Share Result'; }, 1500);
  });
}

init();
</script>
</body>
</html>
