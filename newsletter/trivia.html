<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Trivia | CMU-Q Weekly Games</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --red: #C41230;
    --green: #16a34a;
    --green-light: #dcfce7;
    --red-light: #fee2e2;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container { max-width: 560px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 20px;
  }

  header .back {
    display: inline-block;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  header .back:hover { color: var(--red); }
  header h1 { font-size: 1.5rem; font-weight: 800; }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Progress */
  .progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-dim);
    min-width: 40px;
    text-align: right;
  }

  /* Question card */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-number {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--red);
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 20px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.9rem;
    line-height: 1.35;
  }

  .option:hover { border-color: #bbb; background: #f9f9f9; }

  .option .letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 800;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .option.selected { border-color: var(--text); }
  .option.selected .letter { background: var(--text); color: #fff; border-color: var(--text); }

  .option.correct { border-color: var(--green); background: var(--green-light); }
  .option.correct .letter { background: var(--green); color: #fff; border-color: var(--green); }

  .option.wrong { border-color: #dc2626; background: var(--red-light); }
  .option.wrong .letter { background: #dc2626; color: #fff; border-color: #dc2626; }

  .option.disabled { pointer-events: none; opacity: 0.6; }
  .option.correct.disabled, .option.wrong.disabled { opacity: 1; }

  /* Explanation */
  .explanation {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    background: #f3f4f6;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text-dim);
    animation: fadeIn 0.3s ease;
  }

  /* Next button */
  .next-btn {
    display: none;
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--text);
    color: #fff;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }

  .next-btn:hover { background: #2a2a4e; }
  .next-btn.visible { display: block; }

  /* Results */
  .results-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    text-align: center;
    animation: fadeIn 0.4s ease;
  }

  .results-card.active { display: block; }

  .results-card h2 { font-size: 1.3rem; margin-bottom: 4px; }

  .score-big {
    font-size: 3rem;
    font-weight: 800;
    color: var(--red);
    margin: 16px 0 4px;
  }

  .score-label {
    font-size: 0.9rem;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .score-message {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .results-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #f0f0f0; }
  .btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn.primary:hover { background: #2a2a4e; }

  @media (max-width: 480px) {
    .question-card { padding: 20px; }
    .option { padding: 12px 14px; font-size: 0.85rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="index.html" class="back">&larr; All Games</a>
    <h1>Weekly Trivia</h1>
    <p>Test your knowledge — 10 questions</p>
  </header>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0/10</div>
  </div>

  <div id="question-area"></div>

  <div class="results-card" id="results">
    <h2 id="results-title"></h2>
    <div class="score-big" id="score-big"></div>
    <div class="score-label" id="score-label"></div>
    <div class="score-message" id="score-message"></div>
    <div class="results-actions">
      <button class="btn primary" onclick="shareResults()">Share Results</button>
      <button class="btn" onclick="init()">Play Again</button>
    </div>
    <div id="leaderboard"></div>
  </div>
</div>
<script src="leaderboard.js"></script>

<script>
/* ============================================================
   WEEKLY FEEDBACK — Paste notes here before requesting updates

   Difficulty: (too easy | just right | too hard)
   Notes:
   -
   ============================================================ */

/* ============================================================
   WEEKLY PUZZLE CONFIG — Edit this section each week

   Each question has:
     q: the question text
     options: array of 4 answer strings
     answer: index of the correct option (0-3)
     explanation: shown after answering (optional but recommended)
   ============================================================ */
const PUZZLE_DATE = '2026-04-22';
const QUESTIONS = [
  {
    q: "What does 'STEAM' stand for in education?",
    options: ["Science, Teaching, Engineering, Arts, Mathematics", "Science, Technology, Engineering, Arts, Mathematics", "Society, Technology, Education, Arts, Music", "Science, Technology, Engineering, Analytics, Medicine"],
    answer: 1,
    explanation: "STEAM adds Arts to the traditional STEM framework, encouraging creativity alongside technical skills."
  },
  {
    q: "Which ancient trade gives Qatar's 'Pearl' landmark its name?",
    options: ["Oil trading", "Gold trading", "Pearl diving", "Spice trading"],
    answer: 2,
    explanation: "Before oil, Qatar's economy depended on pearl diving. The Pearl-Qatar island pays tribute to this heritage."
  },
  {
    q: "Which programming language shares its name with a type of coffee?",
    options: ["Python", "Java", "C++", "Rust"],
    answer: 1,
    explanation: "Java was named after Java coffee, reportedly inspired by the developers' coffee consumption during its creation."
  },
  {
    q: "What is CMU's annual spring celebration called?",
    options: ["Homecoming", "Spring Carnival", "Tartanfest", "Scotty Days"],
    answer: 1,
    explanation: "Spring Carnival is CMU's signature tradition since 1920, featuring buggy races, booths, and mobot competitions."
  },
  {
    q: "What is the official currency of Qatar?",
    options: ["Dirham", "Riyal", "Dinar", "Rupee"],
    answer: 1,
    explanation: "The Qatari Riyal (QAR) is the official currency, pegged to the US dollar at a fixed exchange rate."
  },
  {
    q: "In computing, what does 'URL' stand for?",
    options: ["Universal Reference Locator", "Uniform Resource Locator", "Unified Resource Link", "Universal Resource Library"],
    answer: 1,
    explanation: "URL stands for Uniform Resource Locator — the address used to access resources on the internet."
  },
  {
    q: "Which gas is Qatar the world's largest exporter of?",
    options: ["Oil", "Liquefied natural gas (LNG)", "Hydrogen", "Helium"],
    answer: 1,
    explanation: "Qatar is the world's largest exporter of liquefied natural gas (LNG), a key driver of its economy."
  },
  {
    q: "What does 'Big O' notation measure in computer science?",
    options: ["Code quality", "Algorithm efficiency", "File size", "Network speed"],
    answer: 1,
    explanation: "Big O notation describes the upper bound of an algorithm's time or space complexity as input size grows."
  },
  {
    q: "Which Education City university is known for its journalism program?",
    options: ["CMU-Q", "Georgetown University Qatar", "Northwestern University Qatar", "Texas A&M Qatar"],
    answer: 2,
    explanation: "Northwestern University in Qatar (NU-Q) is renowned for its journalism and communication programs."
  },
  {
    q: "What year was the first network email sent?",
    options: ["1965", "1971", "1983", "1991"],
    answer: 1,
    explanation: "The first network email was sent by Ray Tomlinson in 1971, who also introduced the '@' symbol for email addresses."
  },
];
/* ============================================================ */

const LABELS = ['A', 'B', 'C', 'D'];
let currentQ = 0;
let correctCount = 0;
let answered = false;

function init() {
  currentQ = 0;
  correctCount = 0;
  answered = false;
  document.getElementById('results').classList.remove('active');
  renderQuestion();
  updateProgress();
}

function updateProgress() {
  const pct = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = currentQ + '/' + QUESTIONS.length;
}

function renderQuestion() {
  const area = document.getElementById('question-area');
  const q = QUESTIONS[currentQ];

  let html = '<div class="question-card">';
  html += '<div class="question-number">Question ' + (currentQ + 1) + ' of ' + QUESTIONS.length + '</div>';
  html += '<div class="question-text">' + q.q + '</div>';
  html += '<div class="options">';

  q.options.forEach((opt, i) => {
    html += '<div class="option" onclick="selectAnswer(' + i + ')" id="opt-' + i + '">';
    html += '<span class="letter">' + LABELS[i] + '</span>';
    html += '<span>' + opt + '</span>';
    html += '</div>';
  });

  html += '</div>';
  html += '<div id="explanation"></div>';
  html += '<button class="next-btn" id="next-btn" onclick="nextQuestion()">';
  html += currentQ < QUESTIONS.length - 1 ? 'Next Question' : 'See Results';
  html += '</button>';
  html += '</div>';

  area.innerHTML = html;
  answered = false;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentQ];
  const isCorrect = idx === q.answer;
  if (isCorrect) correctCount++;

  // Mark all options
  q.options.forEach((_, i) => {
    const el = document.getElementById('opt-' + i);
    if (i === q.answer) {
      el.classList.add('correct');
    } else if (i === idx && !isCorrect) {
      el.classList.add('wrong');
    } else {
      el.classList.add('disabled');
    }
  });

  // Show explanation
  if (q.explanation) {
    document.getElementById('explanation').innerHTML =
      '<div class="explanation">' + (isCorrect ? 'Correct! ' : 'Not quite. ') + q.explanation + '</div>';
  }

  // Show next button
  document.getElementById('next-btn').classList.add('visible');
}

function nextQuestion() {
  currentQ++;
  updateProgress();

  if (currentQ >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('question-area').innerHTML = '';
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = QUESTIONS.length + '/' + QUESTIONS.length;

  const pct = Math.round((correctCount / QUESTIONS.length) * 100);
  let title, message;
  if (pct === 100) { title = 'Perfect Score!'; message = 'You know it all.'; }
  else if (pct >= 80) { title = 'Impressive!'; message = 'You really know your stuff.'; }
  else if (pct >= 60) { title = 'Well Done!'; message = 'Solid knowledge across the board.'; }
  else if (pct >= 40) { title = 'Not Bad!'; message = 'Room to grow — come back next week!'; }
  else { title = 'Keep Learning!'; message = 'Better luck next week.'; }

  document.getElementById('results-title').textContent = title;
  document.getElementById('score-big').textContent = correctCount + '/' + QUESTIONS.length;
  document.getElementById('score-label').textContent = pct + '% correct';
  document.getElementById('score-message').textContent = message;
  document.getElementById('results').classList.add('active');

  // Leaderboard
  Leaderboard.submit({ game: 'trivia', date: PUZZLE_DATE, score: QUESTIONS.length - correctCount, metric: 'missed', display: correctCount + '/' + QUESTIONS.length });
  Leaderboard.show('leaderboard', 'trivia', PUZZLE_DATE);
}

function shareResults() {
  const pct = Math.round((correctCount / QUESTIONS.length) * 100);
  const text = 'CMU-Q Weekly Trivia ' + PUZZLE_DATE + '\nScore: ' + correctCount + '/' + QUESTIONS.length + ' (' + pct + '%)';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn.primary');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Share Results'; }, 1500);
  });
}

init();
</script>
</body>
</html>
