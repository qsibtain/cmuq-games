<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathler | CMU-Q Weekly Games</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #d3d6da;
    --green: #6aaa64;
    --yellow: #c9b458;
    --gray: #787c7e;
    --key-bg: #d3d6da;
    --red: #C41230;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 16px;
    width: 100%;
    padding-top: 20px;
  }

  header .back {
    display: inline-block;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  header .back:hover { color: var(--red); }
  header h1 { font-size: 1.5rem; font-weight: 800; }

  .target {
    text-align: center;
    margin-bottom: 16px;
    font-size: 0.95rem;
    color: var(--text-dim);
  }

  .target .number {
    display: inline-block;
    background: var(--text);
    color: #fff;
    font-weight: 800;
    font-size: 1.3rem;
    padding: 4px 14px;
    border-radius: 8px;
    margin-left: 6px;
  }

  /* Board */
  .board {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .cell {
    width: 54px;
    height: 54px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 800;
    transition: transform 0.1s;
  }

  .cell.filled { border-color: #888; }
  .cell.pop { animation: pop 0.1s ease; }

  .cell.correct { background: var(--green); border-color: var(--green); color: #fff; }
  .cell.present { background: var(--yellow); border-color: var(--yellow); color: #fff; }
  .cell.absent { background: var(--gray); border-color: var(--gray); color: #fff; }

  .cell.reveal { animation: flip 0.5s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes flip {
    0% { transform: rotateX(0); }
    45% { transform: rotateX(90deg); }
    55% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .row.shake { animation: shake 0.3s ease; }

  /* Status */
  .status-bar {
    min-height: 28px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast {
    background: var(--text);
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    animation: fadeInOut 1.5s ease;
  }

  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(6px); }
    15% { opacity: 1; transform: translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Keyboard */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 500px;
  }

  .kb-row {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .key {
    height: 52px;
    min-width: 38px;
    padding: 0 8px;
    border-radius: 6px;
    border: none;
    background: var(--key-bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
  }

  .key:active { transform: scale(0.95); }
  .key.wide { min-width: 62px; font-size: 0.75rem; }
  .key.op { background: #e8e0f0; }

  .key.correct { background: var(--green); color: #fff; }
  .key.present { background: var(--yellow); color: #fff; }
  .key.absent { background: var(--gray); color: #fff; }

  /* Results */
  .results {
    display: none;
    text-align: center;
    margin-top: 16px;
  }

  .results.active { display: block; }
  .results h2 { font-size: 1.1rem; margin-bottom: 4px; }
  .results p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px; }

  .share-btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: none;
    background: var(--green);
    color: #fff;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .share-btn:hover { opacity: 0.9; }

  @media (max-width: 420px) {
    .cell { width: 46px; height: 46px; font-size: 1.3rem; }
    .key { height: 46px; min-width: 32px; font-size: 0.95rem; }
    .key.wide { min-width: 52px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="index.html" class="back">&larr; All Games</a>
    <h1>Mathler</h1>
  </header>

  <div class="target">
    Find the hidden calculation that equals <span class="number" id="target-num"></span>
  </div>

  <div class="board" id="board"></div>
  <div class="status-bar" id="status-bar"></div>
  <div class="keyboard" id="keyboard"></div>

  <div class="results" id="results">
    <h2 id="result-title"></h2>
    <p id="result-subtitle"></p>
    <button class="share-btn" onclick="shareResults()">Share Results</button>
    <div id="leaderboard"></div>
  </div>
</div>
<script src="leaderboard.js"></script>

<script>
/* ============================================================
   WEEKLY FEEDBACK — Paste notes here before requesting updates

   Difficulty: (too easy | just right | too hard)
   Notes:
   -
   ============================================================ */

/* ============================================================
   WEEKLY PUZZLE CONFIG — Edit this section each week

   TARGET_NUMBER: the result the equation must equal
   TARGET_EQUATION: the hidden equation (exactly 6 characters)
     - Uses digits 0-9 and operators + - * /
     - Must evaluate to TARGET_NUMBER using standard math precedence
   ============================================================ */
const PUZZLE_DATE = '2026-04-16';
const TARGET_NUMBER = 20;
const TARGET_EQUATION = '4*8-12';
/* ============================================================ */

const MAX_GUESSES = 6;
const EQ_LEN = 6;

let guesses = [];
let currentGuess = '';
let gameOver = false;
let keyStates = {};

function init() {
  guesses = [];
  currentGuess = '';
  gameOver = false;
  keyStates = {};
  document.getElementById('target-num').textContent = TARGET_NUMBER;
  document.getElementById('results').classList.remove('active');
  renderBoard();
  renderKeyboard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    for (let c = 0; c < EQ_LEN; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r < guesses.length) {
        cell.textContent = guesses[r].chars[c];
        cell.classList.add(guesses[r].colors[c]);
      } else if (r === guesses.length && c < currentGuess.length) {
        cell.textContent = currentGuess[c];
        cell.classList.add('filled');
      }
      row.appendChild(cell);
    }
    board.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';

  // Row 1: digits
  const row1 = document.createElement('div');
  row1.className = 'kb-row';
  for (const ch of '1234567890') {
    const key = document.createElement('button');
    key.className = 'key';
    if (keyStates[ch]) key.classList.add(keyStates[ch]);
    key.textContent = ch;
    key.onclick = () => addChar(ch);
    row1.appendChild(key);
  }
  kb.appendChild(row1);

  // Row 2: operators + controls
  const row2 = document.createElement('div');
  row2.className = 'kb-row';

  const enter = document.createElement('button');
  enter.className = 'key wide';
  enter.textContent = 'Enter';
  enter.onclick = submitGuess;
  row2.appendChild(enter);

  for (const ch of '+-*/') {
    const key = document.createElement('button');
    key.className = 'key op';
    if (keyStates[ch]) key.classList.add(keyStates[ch]);
    key.textContent = ch;
    key.onclick = () => addChar(ch);
    row2.appendChild(key);
  }

  const del = document.createElement('button');
  del.className = 'key wide';
  del.textContent = '\u232B';
  del.onclick = deleteChar;
  row2.appendChild(del);

  kb.appendChild(row2);
}

function addChar(ch) {
  if (gameOver || currentGuess.length >= EQ_LEN) return;
  currentGuess += ch;
  renderBoard();
  const row = document.getElementById('row-' + guesses.length);
  if (row) {
    const cell = row.children[currentGuess.length - 1];
    if (cell) cell.classList.add('pop');
  }
}

function deleteChar() {
  if (gameOver || currentGuess.length === 0) return;
  currentGuess = currentGuess.slice(0, -1);
  renderBoard();
}

function showToast(msg) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = '<div class="toast">' + msg + '</div>';
  setTimeout(() => { bar.innerHTML = ''; }, 1500);
}

function shakeRow() {
  const row = document.getElementById('row-' + guesses.length);
  if (row) {
    row.classList.add('shake');
    setTimeout(() => row.classList.remove('shake'), 400);
  }
}

function evaluateExpr(expr) {
  // Validate structure: must be digits separated by operators
  if (!/^\d[\d+\-*/]*\d$/.test(expr) && !/^\d$/.test(expr)) return null;
  // No consecutive operators
  if (/[+\-*/]{2,}/.test(expr)) return null;
  // No division by zero
  if (/\/0(?!\d)/.test(expr)) return null;
  try {
    const result = Function('"use strict"; return (' + expr + ')')();
    if (!isFinite(result)) return null;
    return result;
  } catch {
    return null;
  }
}

function submitGuess() {
  if (gameOver) return;
  if (currentGuess.length !== EQ_LEN) {
    shakeRow();
    showToast('Not enough characters');
    return;
  }

  const value = evaluateExpr(currentGuess);
  if (value === null) {
    shakeRow();
    showToast('Invalid equation');
    return;
  }
  if (value !== TARGET_NUMBER) {
    shakeRow();
    showToast('Doesn\u2019t equal ' + TARGET_NUMBER);
    return;
  }

  // Score the guess (same algorithm as Wordle)
  const colors = Array(EQ_LEN).fill('absent');
  const targetArr = TARGET_EQUATION.split('');
  const guessArr = currentGuess.split('');

  // Pass 1: correct positions
  for (let i = 0; i < EQ_LEN; i++) {
    if (guessArr[i] === targetArr[i]) {
      colors[i] = 'correct';
      targetArr[i] = null;
      guessArr[i] = null;
    }
  }
  // Pass 2: present but wrong position
  for (let i = 0; i < EQ_LEN; i++) {
    if (guessArr[i] === null) continue;
    const idx = targetArr.indexOf(guessArr[i]);
    if (idx !== -1) {
      colors[i] = 'present';
      targetArr[idx] = null;
    }
  }

  // Update key states
  currentGuess.split('').forEach((ch, i) => {
    const priority = { correct: 3, present: 2, absent: 1 };
    if ((priority[colors[i]] || 0) > (priority[keyStates[ch]] || 0)) {
      keyStates[ch] = colors[i];
    }
  });

  const guess = { chars: currentGuess, colors };
  guesses.push(guess);

  const won = currentGuess === TARGET_EQUATION;
  const lost = !won && guesses.length >= MAX_GUESSES;

  currentGuess = '';
  renderBoard();

  // Flip animation
  const rowEl = document.getElementById('row-' + (guesses.length - 1));
  if (rowEl) {
    Array.from(rowEl.children).forEach((cell, i) => {
      cell.style.animationDelay = (i * 0.15) + 's';
      cell.classList.add('reveal');
    });
  }

  setTimeout(() => {
    renderKeyboard();

    if (won) {
      gameOver = true;
      showToast('Solved!');
      setTimeout(() => showResultPanel(true), 1600);
    } else if (lost) {
      gameOver = true;
      showToast(TARGET_EQUATION);
      setTimeout(() => showResultPanel(false), 1600);
    }
  }, EQ_LEN * 150 + 300);
}

function showResultPanel(won) {
  const panel = document.getElementById('results');
  document.getElementById('result-title').textContent =
    won ? 'Solved in ' + guesses.length + '/' + MAX_GUESSES : 'Maybe next week!';
  document.getElementById('result-subtitle').textContent =
    won ? '' : 'The answer was ' + TARGET_EQUATION;
  panel.classList.add('active');

  // Leaderboard
  if (won) {
    Leaderboard.submit({ game: 'mathler', date: PUZZLE_DATE, score: guesses.length, metric: 'guesses', display: guesses.length + '/6' });
  }
  Leaderboard.show('leaderboard', 'mathler', PUZZLE_DATE);
}

function shareResults() {
  const emojiMap = { correct: '\uD83D\uDFE9', present: '\uD83D\uDFE8', absent: '\u2B1C' };
  const lines = ['CMU-Q Mathler ' + PUZZLE_DATE + ' ' + guesses.length + '/' + MAX_GUESSES, ''];
  for (const g of guesses) {
    lines.push(g.colors.map(c => emojiMap[c]).join(''));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    showToast('Copied to clipboard!');
  });
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') submitGuess();
  else if (e.key === 'Backspace') deleteChar();
  else if (/^[0-9+\-*/]$/.test(e.key)) addChar(e.key);
});

init();
</script>
</body>
</html>
