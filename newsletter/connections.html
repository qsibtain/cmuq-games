<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections | CMU-Q Weekly Games</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --red: #C41230;
    --yellow: #f9df6d;
    --green: #a0c35a;
    --blue: #b0c4ef;
    --purple: #ba81c5;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .container { max-width: 500px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 20px;
  }

  header .back {
    display: inline-block;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  header .back:hover { color: var(--red); }

  header h1 { font-size: 1.5rem; font-weight: 800; }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Solved groups */
  .solved-groups { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }

  .solved-row {
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
    animation: dropIn 0.4s ease;
  }

  .solved-row .category {
    font-weight: 800;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
    color: #1a1a2e;
  }

  .solved-row .words {
    font-size: 0.8rem;
    color: rgba(26,26,46,0.7);
  }

  @keyframes dropIn {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .tile {
    aspect-ratio: 1.6;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    padding: 4px;
    text-align: center;
    line-height: 1.2;
  }

  .tile:hover { border-color: #ccc; }
  .tile.selected {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .tile.shake { animation: shake 0.4s ease; }

  /* Controls */
  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: #f0f0f0; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn.primary {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }
  .btn.primary:hover { background: #2a2a4e; }
  .btn.primary:disabled { background: #888; border-color: #888; }

  /* Mistakes */
  .mistakes {
    text-align: center;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .mistakes .dots {
    display: inline-flex;
    gap: 4px;
    margin-left: 6px;
  }

  .mistakes .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #1a1a2e;
    transition: opacity 0.3s;
  }

  .mistakes .dot.used { opacity: 0.15; }

  /* Status */
  .status {
    text-align: center;
    font-size: 0.95rem;
    font-weight: 700;
    min-height: 1.4em;
    margin-bottom: 16px;
  }

  .status.hint { color: var(--text-dim); font-weight: 400; font-size: 0.85rem; }

  /* Results modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  .modal h2 { font-size: 1.3rem; margin-bottom: 8px; }
  .modal p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 16px; }

  .result-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
    margin-bottom: 20px;
  }

  .result-row {
    display: flex;
    gap: 4px;
  }

  .result-dot {
    width: 28px;
    height: 28px;
    border-radius: 6px;
  }

  .modal .btn { margin: 0 4px; }

  @media (max-width: 480px) {
    .tile { font-size: 0.7rem; }
    .btn { padding: 8px 16px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="index.html" class="back">&larr; All Games</a>
    <h1>Connections</h1>
    <p>Find four groups of four</p>
  </header>

  <div id="solved-groups" class="solved-groups"></div>
  <div id="grid" class="grid"></div>
  <div id="status" class="status"></div>
  <div class="mistakes">
    Mistakes remaining:
    <span class="dots" id="dots">
      <span class="dot"></span><span class="dot"></span>
      <span class="dot"></span><span class="dot"></span>
    </span>
  </div>
  <div class="controls">
    <button class="btn" id="btn-shuffle" onclick="shuffleRemaining()">Shuffle</button>
    <button class="btn" id="btn-deselect" onclick="deselectAll()">Deselect All</button>
    <button class="btn primary" id="btn-submit" onclick="submitGuess()" disabled>Submit</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-subtitle"></p>
    <div class="result-grid" id="result-grid"></div>
    <button class="btn primary" onclick="copyResults()">Share Results</button>
    <button class="btn" onclick="document.getElementById('modal').classList.remove('active')">Close</button>
  </div>
</div>

<script>
/* ============================================================
   WEEKLY FEEDBACK — Paste notes here before requesting updates

   Difficulty: (too easy | just right | too hard)
   Notes:
   -
   ============================================================ */

/* ============================================================
   WEEKLY PUZZLE CONFIG — Edit this section each week
   ============================================================ */
const PUZZLE = {
  date: "2026-04-11",
  groups: [
    {
      category: "Campus Spots",
      words: ["GATES", "PORTER", "LIBRARY", "GARDEN"],
      difficulty: 0  // yellow (easiest)
    },
    {
      category: "Programming Languages",
      words: ["PYTHON", "JAVA", "SWIFT", "RUST"],
      difficulty: 1  // green
    },
    {
      category: "Qatar Landmarks",
      words: ["PEARL", "SOUQ", "KATARA", "MUSEUM"],
      difficulty: 2  // blue
    },
    {
      category: "Types of Tea",
      words: ["KARAK", "MATCHA", "CHAI", "EARL"],
      difficulty: 3  // purple (hardest)
    }
  ]
};
/* ============================================================ */

const COLORS = ['var(--yellow)', 'var(--green)', 'var(--blue)', 'var(--purple)'];
const EMOJIS = ['🟨', '🟩', '🟦', '🟪'];

let remaining = [];    // words still on the board
let selected = [];     // currently selected words
let solved = [];       // solved group indices (by difficulty)
let mistakes = 0;
let maxMistakes = 4;
let guessHistory = []; // for share results
let gameOver = false;

function init() {
  // Gather all words and shuffle
  remaining = [];
  PUZZLE.groups.forEach(g => {
    g.words.forEach(w => remaining.push(w));
  });
  shuffle(remaining);
  selected = [];
  solved = [];
  mistakes = 0;
  guessHistory = [];
  gameOver = false;
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function shuffleRemaining() {
  shuffle(remaining);
  render();
}

function deselectAll() {
  selected = [];
  render();
}

function toggleSelect(word) {
  if (gameOver) return;
  const idx = selected.indexOf(word);
  if (idx !== -1) {
    selected.splice(idx, 1);
  } else if (selected.length < 4) {
    selected.push(word);
  }
  render();
}

function findGroupForWords(words) {
  for (let i = 0; i < PUZZLE.groups.length; i++) {
    const g = PUZZLE.groups[i];
    if (words.length === g.words.length && words.every(w => g.words.includes(w))) {
      return i;
    }
  }
  return -1;
}

function countOverlap(words) {
  let best = 0;
  for (const g of PUZZLE.groups) {
    if (solved.includes(g.difficulty)) continue;
    const overlap = words.filter(w => g.words.includes(w)).length;
    if (overlap > best) best = overlap;
  }
  return best;
}

function submitGuess() {
  if (gameOver || selected.length !== 4) return;

  const groupIdx = findGroupForWords(selected);

  if (groupIdx !== -1) {
    // Correct!
    const group = PUZZLE.groups[groupIdx];
    solved.push(group.difficulty);
    guessHistory.push(selected.map(w => {
      for (const g of PUZZLE.groups) {
        if (g.words.includes(w)) return g.difficulty;
      }
      return 0;
    }));
    remaining = remaining.filter(w => !selected.includes(w));
    selected = [];

    if (solved.length === 4) {
      gameOver = true;
      render();
      setTimeout(() => showResults(true), 600);
      return;
    }

    render();
    setStatus('');
  } else {
    // Wrong
    const overlap = countOverlap(selected);
    guessHistory.push(selected.map(w => {
      for (const g of PUZZLE.groups) {
        if (g.words.includes(w)) return g.difficulty;
      }
      return 0;
    }));
    mistakes++;

    if (overlap === 3) {
      setStatus('One away!', 'hint');
    } else {
      setStatus('');
    }

    // Shake animation
    const tiles = document.querySelectorAll('.tile.selected');
    tiles.forEach(t => {
      t.classList.add('shake');
      setTimeout(() => t.classList.remove('shake'), 500);
    });

    selected = [];

    if (mistakes >= maxMistakes) {
      gameOver = true;
      // Reveal all remaining groups
      for (const g of PUZZLE.groups) {
        if (!solved.includes(g.difficulty)) {
          solved.push(g.difficulty);
          remaining = remaining.filter(w => !g.words.includes(w));
        }
      }
      render();
      setTimeout(() => showResults(false), 600);
      return;
    }

    render();
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
  if (msg) {
    setTimeout(() => {
      el.textContent = '';
      el.className = 'status';
    }, 2000);
  }
}

function render() {
  // Solved groups
  const solvedEl = document.getElementById('solved-groups');
  solvedEl.innerHTML = '';
  // Sort solved by difficulty for display
  const sortedSolved = [...solved].sort((a, b) => a - b);
  for (const diff of sortedSolved) {
    const group = PUZZLE.groups.find(g => g.difficulty === diff);
    const row = document.createElement('div');
    row.className = 'solved-row';
    row.style.background = COLORS[diff];
    row.innerHTML = `
      <div class="category">${group.category}</div>
      <div class="words">${group.words.join(', ')}</div>
    `;
    solvedEl.appendChild(row);
  }

  // Grid
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (const word of remaining) {
    const tile = document.createElement('div');
    tile.className = 'tile' + (selected.includes(word) ? ' selected' : '');
    tile.textContent = word;
    tile.onclick = () => toggleSelect(word);
    grid.appendChild(tile);
  }

  // Submit button
  document.getElementById('btn-submit').disabled = selected.length !== 4;

  // Mistake dots
  const dots = document.querySelectorAll('#dots .dot');
  dots.forEach((d, i) => {
    d.classList.toggle('used', i < mistakes);
  });

  // Disable controls if game over
  if (gameOver) {
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('btn-shuffle').disabled = true;
    document.getElementById('btn-deselect').disabled = true;
  }
}

function showResults(won) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = won ? 'Well done!' : 'Better luck next week!';
  document.getElementById('modal-subtitle').textContent =
    won ? `Solved with ${mistakes} mistake${mistakes !== 1 ? 's' : ''}` : 'Here\'s how you did:';

  const grid = document.getElementById('result-grid');
  grid.innerHTML = '';
  for (const row of guessHistory) {
    const rowEl = document.createElement('div');
    rowEl.className = 'result-row';
    for (const diff of row) {
      const dot = document.createElement('div');
      dot.className = 'result-dot';
      dot.style.background = COLORS[diff];
      rowEl.appendChild(dot);
    }
    grid.appendChild(rowEl);
  }

  modal.classList.add('active');
}

function copyResults() {
  const lines = ['CMU-Q Connections ' + PUZZLE.date];
  for (const row of guessHistory) {
    lines.push(row.map(d => EMOJIS[d]).join(''));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    setStatus('Copied to clipboard!');
  });
  document.getElementById('modal').classList.remove('active');
}

init();
</script>
</body>
</html>
