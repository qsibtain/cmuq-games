<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle | CMU-Q Weekly Games</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-dim: #6b7280;
    --border: #d3d6da;
    --green: #6aaa64;
    --yellow: #c9b458;
    --gray: #787c7e;
    --key-bg: #d3d6da;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .container {
    max-width: 500px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    width: 100%;
    padding-top: 20px;
  }

  header .back {
    display: inline-block;
    margin-bottom: 12px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  header .back:hover { color: #C41230; }

  header h1 { font-size: 1.5rem; font-weight: 800; }
  header p { color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; }

  /* Board */
  .board {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .cell {
    width: 58px;
    height: 58px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 800;
    text-transform: uppercase;
    transition: transform 0.1s;
  }

  .cell.filled { border-color: #888; }
  .cell.pop { animation: pop 0.1s ease; }

  .cell.correct {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }
  .cell.present {
    background: var(--yellow);
    border-color: var(--yellow);
    color: #fff;
  }
  .cell.absent {
    background: var(--gray);
    border-color: var(--gray);
    color: #fff;
  }

  .cell.reveal {
    animation: flip 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes flip {
    0% { transform: rotateX(0); }
    45% { transform: rotateX(90deg); }
    55% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .row.shake { animation: shake 0.3s ease; }

  /* Status */
  .status-bar {
    min-height: 28px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .toast {
    background: var(--text);
    color: #fff;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    animation: fadeInOut 1.5s ease;
  }

  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateY(6px); }
    15% { opacity: 1; transform: translateY(0); }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Keyboard */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    max-width: 500px;
  }

  .kb-row {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .key {
    height: 52px;
    min-width: 35px;
    padding: 0 8px;
    border-radius: 6px;
    border: none;
    background: var(--key-bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
    text-transform: uppercase;
  }

  .key:active { transform: scale(0.95); }
  .key.wide { min-width: 58px; font-size: 0.75rem; }

  .key.correct { background: var(--green); color: #fff; }
  .key.present { background: var(--yellow); color: #fff; }
  .key.absent { background: var(--gray); color: #fff; }

  /* Results */
  .results {
    display: none;
    text-align: center;
    margin-top: 16px;
  }

  .results.active { display: block; }
  .results h2 { font-size: 1.1rem; margin-bottom: 4px; }
  .results p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 12px; }

  .share-btn {
    padding: 10px 24px;
    border-radius: 24px;
    border: none;
    background: var(--green);
    color: #fff;
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .share-btn:hover { opacity: 0.9; }

  @media (max-width: 420px) {
    .cell { width: 50px; height: 50px; font-size: 1.5rem; }
    .key { height: 46px; min-width: 28px; font-size: 0.75rem; }
    .key.wide { min-width: 48px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="index.html" class="back">&larr; All Games</a>
    <h1>Wordle</h1>
    <p>Guess the word in 6 tries</p>
  </header>

  <div class="board" id="board"></div>
  <div class="status-bar" id="status-bar"></div>
  <div class="keyboard" id="keyboard"></div>

  <div class="results" id="results">
    <h2 id="result-title"></h2>
    <p id="result-subtitle"></p>
    <button class="share-btn" onclick="shareResults()">Share Results</button>
  </div>
</div>

  'TROOP','TRUCK','TRULY','TRUMP','TRUNK','TRUST','TRUTH','TULIP','TUMOR','TUNED',
  'TWICE','TWIST','ULTRA','UNCLE','UNDER','UNIFY','UNION','UNITE','UNITY','UNTIL',
  'UPPER','UPSET','URBAN','USAGE','USUAL','VALID','VALUE','VAPOR','VAULT','VIDEO',
  'VIGOR','VINYL','VIRAL','VIRUS','VISIT','VITAL','VIVID','VOCAL','VODKA','VOICE',
  'VOTER','WAIST','WASTE','WATCH','WATER','WEARY','WEAVE','WEDGE','WEIGH','WEIRD',
  'WHEAT','WHEEL','WHERE','WHICH','WHILE','WHINE','WHITE','WHOLE','WHOSE','WIDER',
  'WIDTH','WITCH','WOMAN','WOMEN','WORLD','WORRY','WORSE','WORST','WORTH','WOULD',
  'WOUND','WRATH','WRIST','WRITE','WRONG','WROTE','YACHT','YIELD','YOUNG','YOUTH',
  'ZEBRA',
]);

const MAX_GUESSES = 6;
const WORD_LEN = 5;

let guesses = [];      // [{word, colors}]
let currentGuess = '';
let gameOver = false;
let keyStates = {};

function init() {
  guesses = [];
  currentGuess = '';
  gameOver = false;
  keyStates = {};
  document.getElementById('results').classList.remove('active');
  renderBoard();
  renderKeyboard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < MAX_GUESSES; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'row-' + r;
    for (let c = 0; c < WORD_LEN; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r < guesses.length) {
        cell.textContent = guesses[r].word[c];
        cell.classList.add(guesses[r].colors[c]);
      } else if (r === guesses.length && c < currentGuess.length) {
        cell.textContent = currentGuess[c];
        cell.classList.add('filled');
      }
      row.appendChild(cell);
    }
    board.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
  rows.forEach((r, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'kb-row';
    if (ri === 2) {
      const enter = document.createElement('button');
      enter.className = 'key wide';
      enter.textContent = 'Enter';
      enter.onclick = submitGuess;
      rowDiv.appendChild(enter);
    }
    for (const ch of r) {
      const key = document.createElement('button');
      key.className = 'key';
      if (keyStates[ch]) key.classList.add(keyStates[ch]);
      key.textContent = ch;
      key.onclick = () => addLetter(ch);
      rowDiv.appendChild(key);
    }
    if (ri === 2) {
      const del = document.createElement('button');
      del.className = 'key wide';
      del.textContent = '⌫';
      del.onclick = deleteLetter;
      rowDiv.appendChild(del);
    }
    kb.appendChild(rowDiv);
  });
}

function addLetter(ch) {
  if (gameOver || currentGuess.length >= WORD_LEN) return;
  currentGuess += ch;
  renderBoard();
  // Pop animation on latest cell
  const row = document.getElementById('row-' + guesses.length);
  if (row) {
    const cell = row.children[currentGuess.length - 1];
    if (cell) { cell.classList.add('pop'); }
  }
}

function deleteLetter() {
  if (gameOver || currentGuess.length === 0) return;
  currentGuess = currentGuess.slice(0, -1);
  renderBoard();
}

function showToast(msg) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = `<div class="toast">${msg}</div>`;
  setTimeout(() => { bar.innerHTML = ''; }, 1500);
}

function submitGuess() {
  if (gameOver) return;
  if (currentGuess.length !== WORD_LEN) {
    shakeRow();
    showToast('Not enough letters');
    return;
  }
  if (!VALID_WORDS.has(currentGuess)) {
    shakeRow();
    showToast('Not in word list');
    return;
  }

  // Score
  const colors = Array(WORD_LEN).fill('absent');
  const targetArr = TARGET.split('');
  const guessArr = currentGuess.split('');

  for (let i = 0; i < WORD_LEN; i++) {
    if (guessArr[i] === targetArr[i]) {
      colors[i] = 'correct';
      targetArr[i] = null;
      guessArr[i] = null;
    }
  }
  for (let i = 0; i < WORD_LEN; i++) {
    if (guessArr[i] === null) continue;
    const idx = targetArr.indexOf(guessArr[i]);
    if (idx !== -1) {
      colors[i] = 'present';
      targetArr[idx] = null;
    }
  }

  // Update key states
  currentGuess.split('').forEach((ch, i) => {
    const priority = { correct: 3, present: 2, absent: 1 };
    if ((priority[colors[i]] || 0) > (priority[keyStates[ch]] || 0)) {
      keyStates[ch] = colors[i];
    }
  });

  const guess = { word: currentGuess, colors };
  guesses.push(guess);

  const won = currentGuess === TARGET;
  const lost = !won && guesses.length >= MAX_GUESSES;

  currentGuess = '';
  renderBoard();

  // Flip animation
  const rowEl = document.getElementById('row-' + (guesses.length - 1));
  if (rowEl) {
    Array.from(rowEl.children).forEach((cell, i) => {
      cell.style.animationDelay = (i * 0.15) + 's';
      cell.classList.add('reveal');
    });
  }

  // Delayed keyboard update (after flip)
  setTimeout(() => {
    renderKeyboard();

    if (won) {
      gameOver = true;
      const msgs = ['Genius!', 'Magnificent!', 'Impressive!', 'Splendid!', 'Great!', 'Phew!'];
      showToast(msgs[guesses.length - 1] || 'Nice!');
      setTimeout(() => showResultPanel(true), 1600);
    } else if (lost) {
      gameOver = true;
      showToast(TARGET);
      setTimeout(() => showResultPanel(false), 1600);
    }
  }, WORD_LEN * 150 + 300);
}

function shakeRow() {
  const row = document.getElementById('row-' + guesses.length);
  if (row) {
    row.classList.add('shake');
    setTimeout(() => row.classList.remove('shake'), 400);
  }
}

function showResultPanel(won) {
  const panel = document.getElementById('results');
  document.getElementById('result-title').textContent =
    won ? `Solved in ${guesses.length}/6` : 'Maybe next week!';
  document.getElementById('result-subtitle').textContent =
    won ? '' : `The word was ${TARGET}`;
  panel.classList.add('active');
}

function shareResults() {
  const emojiMap = { correct: '🟩', present: '🟨', absent: '⬜' };
  const lines = [`CMU-Q Wordle ${PUZZLE_DATE} ${guesses.length}/${MAX_GUESSES}`, ''];
  for (const g of guesses) {
    lines.push(g.colors.map(c => emojiMap[c]).join(''));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    showToast('Copied to clipboard!');
  });
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') submitGuess();
  else if (e.key === 'Backspace') deleteLetter();
  else if (/^[a-zA-Z]$/.test(e.key)) addLetter(e.key.toUpperCase());
});

init();
</script>

</html>
