<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scotty Run — CMU Global Platformer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    border: 2px solid #333;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// SCOTTY RUN — A CMU Global Platformer (4 Levels)
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 1600, H = 960;
canvas.width = W;
canvas.height = H;

const T = 64; // tile size (2x for high-res)

// ============================================================
// LEVEL DATA — 4 levels, 75 tiles wide x 15 tiles tall
// 0=air, 1=ground, 2=brick, 3=collectible, 4=enemy, 5=goal/boss-trigger, 6=health(CMU shield)
// ============================================================
const LEVEL_W = 75;
const LEVEL_H = 15;

const allLevelData = [

    '000000000004000000000004000004000002220004000000040000040000022200000000050',

// Level metadata
const levelInfo = [
  { name: 'Doha, Qatar',      boss: null,         bossHP: 0, subtitle: 'CMU-Q Campus' },
  { name: 'Kigali, Rwanda',   boss: 'Fuad',       bossHP: 3, subtitle: 'CMU-Africa Campus',     bossTitle: 'Area Head, Business Administration' },
  { name: 'Silicon Valley',   boss: 'Dudley',     bossHP: 4, subtitle: 'CMU-SV Campus',         bossTitle: 'Sr. Associate Dean for Education' },
  { name: 'Pittsburgh, PA',   boss: 'Mike Trick',  bossHP: 5, subtitle: 'CMU Main Campus',      bossTitle: 'The Dean' },
];

// Active level (parsed into 2D array)
let level = [];
let currentLevel = 0;

function loadLevel(idx) {
  currentLevel = idx;
  level = allLevelData[idx].map(row => row.split('').map(Number));
}

// ============================================================
// GAME STATE
// ============================================================
let gameState = 'title'; // title, levelIntro, playing, bossFight, bossDefeated, passNoPass, gameover, victory
let score = 0;
let lives = 5;
let camera = { x: 0 };
let frameCount = 0;
let levelIntroTimer = 0;
let usedPassNoPass = [false, false, false, false]; // track P/NP per level
let bossDeathCount = 0; // deaths during current boss fight
let gameMode = 0; // 0=Normal, 1=Assist (can't die), 2=Invincible (shield + float)
let titleSelection = 0; // which mode is highlighted on title screen
let screenShake = 0; // visual polish: shake frames remaining
let screenShakeX = 0;
let screenShakeY = 0;

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyP'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ============================================================
// SOUND EFFECTS (Web Audio API)
// ============================================================
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);

  if (type === 'jump') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(300, now);
    o.frequency.linearRampToValueAtTime(500, now + 0.1);
    g.gain.setValueAtTime(0.15, now);
    g.gain.linearRampToValueAtTime(0, now + 0.1);
    o.connect(g); o.start(now); o.stop(now + 0.1);
  } else if (type === 'doublejump') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(500, now);
    o.frequency.linearRampToValueAtTime(800, now + 0.08);
    g.gain.setValueAtTime(0.12, now);
    g.gain.linearRampToValueAtTime(0, now + 0.08);
    o.connect(g); o.start(now); o.stop(now + 0.08);
  } else if (type === 'coin') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(880, now);
    o.frequency.setValueAtTime(1100, now + 0.07);
    g.gain.setValueAtTime(0.15, now);
    g.gain.linearRampToValueAtTime(0, now + 0.15);
    o.connect(g); o.start(now); o.stop(now + 0.15);
  } else if (type === 'health') {
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(400, now);
    o.frequency.linearRampToValueAtTime(900, now + 0.3);
    g.gain.setValueAtTime(0.15, now);
    g.gain.linearRampToValueAtTime(0, now + 0.3);
    o.connect(g); o.start(now); o.stop(now + 0.3);
  } else if (type === 'stomp') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(150, now);
    o.frequency.linearRampToValueAtTime(50, now + 0.1);
    g.gain.setValueAtTime(0.2, now);
    g.gain.linearRampToValueAtTime(0, now + 0.1);
    o.connect(g); o.start(now); o.stop(now + 0.1);
  } else if (type === 'hit') {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(100, now);
    o.frequency.linearRampToValueAtTime(60, now + 0.2);
    g.gain.setValueAtTime(0.15, now);
    g.gain.linearRampToValueAtTime(0, now + 0.2);
    o.connect(g); o.start(now); o.stop(now + 0.2);
  } else if (type === 'bossstomp') {
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(200, now);
    o.frequency.linearRampToValueAtTime(40, now + 0.2);
    g.gain.setValueAtTime(0.25, now);
    g.gain.linearRampToValueAtTime(0, now + 0.2);
    o.connect(g); o.start(now); o.stop(now + 0.2);
  } else if (type === 'bossdefeat') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const gn = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, now + i * 0.12);
      gn.gain.setValueAtTime(0.15, now + i * 0.12);
      gn.gain.linearRampToValueAtTime(0, now + i * 0.12 + 0.15);
      o.connect(gn); gn.connect(audioCtx.destination);
      o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.15);
    });
  }
}

// ============================================================
// PLAYER
// ============================================================
const player = {
  x: 128, y: 0,
  w: 48, h: 56,
  vx: 0, vy: 0,
  onGround: false,
  facing: 1,
  animFrame: 0,
  animTimer: 0,
  invincible: 0,
  dead: false,
  deadTimer: 0,
  jumps: 0,
  maxJumps: 2,
  jumpPressed: false,
};

function resetPlayer() {
  player.x = 128;
  player.y = 12 * T - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.facing = 1;
  player.invincible = 0;
  player.dead = false;
  player.deadTimer = 0;
  player.jumps = 0;
  player.jumpPressed = false;
}

// ============================================================
// ENTITIES
// ============================================================
let collectibles = [];
let enemies = [];
let healthPickups = [];
let particles = [];
let goalX = 0;

// Boss state
let boss = null;
let bossProjectiles = [];

function initEntities() {
  collectibles = [];
  enemies = [];
  healthPickups = [];
  particles = [];
  bossProjectiles = [];
  goalX = 0;
  boss = null;
  for (let r = 0; r < LEVEL_H; r++) {
    for (let c = 0; c < LEVEL_W; c++) {
      const tile = level[r][c];
      if (tile === 3) {
        collectibles.push({ x: c * T + 8, y: r * T + 8, w: 48, h: 48, collected: false, bobOffset: Math.random() * Math.PI * 2 });
        level[r][c] = 0;
      } else if (tile === 6) {
        healthPickups.push({ x: c * T + 8, y: r * T + 8, w: 48, h: 48, collected: false, bobOffset: Math.random() * Math.PI * 2 });
        level[r][c] = 0;
      } else if (tile === 4) {
        enemies.push({
          x: c * T, y: r * T + 8, w: 56, h: 56,
          vx: (Math.random() > 0.5 ? -1 : 1) * (2 + currentLevel * 0.5 + Math.random()),
          alive: true,
          type: enemies.length % 2 === 0 ? 'deadline' : 'profRedPen',
          animTimer: Math.random() * 100,
          startX: c * T,
          patrol: 160 + currentLevel * 20,
          jumpTimer: Math.floor(Math.random() * 120),
          vy: 0,
        });
        level[r][c] = 0;
      } else if (tile === 5) {
        goalX = c * T;
        level[r][c] = 0;
      }
    }
  }
}

function spawnBoss() {
  const info = levelInfo[currentLevel];
  if (!info.boss) return;
  boss = {
    x: goalX - 120,
    y: 12 * T - 88,
    w: 80, h: 88,
    vx: 2 + currentLevel * 0.5,
    hp: info.bossHP,
    maxHP: info.bossHP,
    name: info.boss,
    title: info.bossTitle,
    alive: true,
    animTimer: 0,
    attackTimer: 0,
    attackCooldown: 150 - currentLevel * 20,
    hitFlash: 0,
    startX: goalX - 240,
    patrol: 200,
    phase: 1,
  };
}

// ============================================================
// PHYSICS & COLLISION
// ============================================================
const GRAVITY = 0.6;
const MAX_FALL = 14;
const MOVE_SPEED = 5.5;
const JUMP_FORCE = -15.5;
const FRICTION = 0.85;

function getTile(px, py) {
  const c = Math.floor(px / T);
  const r = Math.floor(py / T);
  if (c < 0 || c >= LEVEL_W || r < 0 || r >= LEVEL_H) return 0;
  return level[r][c];
}

function isSolid(px, py) {
  const t = getTile(px, py);
  return t === 1 || t === 2;
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function updatePlayer() {
  if (player.dead) {
    player.deadTimer++;
    player.vy += GRAVITY;
    player.y += player.vy;
    if (player.deadTimer > 60) {
      lives--;
      if (lives <= 0) {
        if (gameState === 'bossFight') {
          // Offer Pass/No-Pass option instead of game over
          bossDeathCount++;
          lives = 1; // give them a life back for the prompt
          gameState = 'passNoPass';
          resetPlayer();
        } else {
          gameState = 'gameover';
        }
      } else {
        if (gameState === 'bossFight') {
          bossDeathCount++;
          // After 2 deaths on a boss, offer P/NP
          if (bossDeathCount >= 2) {
            gameState = 'passNoPass';
          }
        }
        resetPlayer();
      }
    }
    return;
  }

  // Horizontal movement
  if (keys['ArrowLeft']) {
    player.vx = -MOVE_SPEED;
    player.facing = -1;
  } else if (keys['ArrowRight']) {
    player.vx = MOVE_SPEED;
    player.facing = 1;
  } else {
    player.vx *= FRICTION;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Jump (double jump)
  if (keys['Space'] && !player.jumpPressed) {
    if (player.jumps < player.maxJumps) {
      player.vy = player.jumps === 0 ? JUMP_FORCE : JUMP_FORCE * 0.9;
      playSound(player.jumps === 0 ? 'jump' : 'doublejump');
      player.jumps++;
      player.onGround = false;
      player.jumpPressed = true;
    }
  }
  if (!keys['Space']) player.jumpPressed = false;

  // Gravity — invincible mode: float (up/down controls)
  if (gameMode === 2) {
    if (keys['ArrowUp']) player.vy = -MOVE_SPEED;
    else if (keys['ArrowDown']) player.vy = MOVE_SPEED;
    else player.vy *= 0.8;
    if (Math.abs(player.vy) < 0.1) player.vy = 0;
  } else {
    player.vy += GRAVITY;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }

  // Move X
  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > LEVEL_W * T) player.x = LEVEL_W * T - player.w;

  // X collision
  if (player.vx > 0) {
    if (isSolid(player.x + player.w, player.y + 2) || isSolid(player.x + player.w, player.y + player.h - 2)) {
      player.x = Math.floor((player.x + player.w) / T) * T - player.w;
      player.vx = 0;
    }
  } else if (player.vx < 0) {
    if (isSolid(player.x, player.y + 2) || isSolid(player.x, player.y + player.h - 2)) {
      player.x = Math.floor(player.x / T) * T + T;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;

  // Y collision
  player.onGround = false;
  if (player.vy > 0) {
    if (isSolid(player.x + 2, player.y + player.h) || isSolid(player.x + player.w - 2, player.y + player.h)) {
      player.y = Math.floor((player.y + player.h) / T) * T - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumps = 0;
    }
  } else if (player.vy < 0) {
    if (isSolid(player.x + 2, player.y) || isSolid(player.x + player.w - 2, player.y)) {
      player.y = Math.floor(player.y / T) * T + T;
      player.vy = 0;
    }
  }

  // Fall off screen
  if (player.y > LEVEL_H * T + 50) {
    if (gameMode === 2) {
      player.y = LEVEL_H * T - 50; // bounce back up
      player.vy = -5;
    } else {
      player.dead = true;
      player.deadTimer = 30;
    }
  }
  // Keep invincible player on screen vertically
  if (gameMode === 2 && player.y < 0) { player.y = 0; player.vy = 0; }

  // Invincibility countdown
  if (player.invincible > 0) player.invincible--;

  // Animation
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    player.animTimer++;
    if (player.animTimer > 8) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 2;
    }
  } else {
    player.animFrame = 0;
    player.animTimer = 0;
  }

  // Check goal — in playing mode, reaching goal triggers next level or boss
  if (gameState === 'playing' && player.x + player.w / 2 > goalX && goalX > 0) {
    if (levelInfo[currentLevel].boss) {
      // Start boss fight with dramatic entrance
      gameState = 'bossEntrance';
      bossDeathCount = 0;
      levelIntroTimer = 90; // 1.5 second entrance
      spawnBoss();
    } else {
      // No boss — advance level
      advanceLevel();
    }
  }
}

function advanceLevel() {
  if (currentLevel >= 3) {
    gameState = 'victory';
  } else {
    currentLevel++;
    startLevel(currentLevel);
  }
}

function startLevel(idx) {
  loadLevel(idx);
  initEntities();
  resetPlayer();
  camera.x = 0;
  gameState = 'levelIntro';
  levelIntroTimer = 150; // ~2.5 seconds
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;

    // Horizontal movement
    e.x += e.vx;
    if (e.x < e.startX - e.patrol || e.x > e.startX + e.patrol) {
      e.vx *= -1;
    }

    const nextX = e.x + (e.vx > 0 ? e.w : 0);
    if (isSolid(nextX, e.y + e.h - 2)) {
      e.vx *= -1;
    }
    const footX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2;
    if (!isSolid(footX, e.y + e.h + 2) && e.vy === 0) {
      e.vx *= -1;
    }

    // Vertical — jumping enemies (deadline clocks hop around)
    if (e.type === 'deadline') {
      e.jumpTimer--;
      if (e.jumpTimer <= 0 && e.vy === 0) {
        e.vy = -8;
        e.jumpTimer = 80 + Math.floor(Math.random() * 60);
      }
    }
    // Gravity for enemies
    e.vy = (e.vy || 0) + 0.4;
    if (e.vy > 8) e.vy = 8;
    e.y += e.vy;
    // Land on ground
    if (isSolid(e.x + e.w / 2, e.y + e.h + 1)) {
      e.y = Math.floor((e.y + e.h) / T) * T - e.h;
      e.vy = 0;
    }
    // Fall off check
    if (e.y > LEVEL_H * T + 100) { e.alive = false; continue; }

    e.animTimer++;

    if (player.dead || player.invincible > 0) continue;
    if (rectsOverlap(player, e)) {
      if (gameMode === 2) {
        // Invincible shield destroys enemies on contact
        e.alive = false;
        e.squish = 5;
        score += 200;
        playSound('stomp');
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#4af', 8);
        continue;
      }
      if (player.vy > 0 && player.y + player.h - 16 < e.y + e.h / 2) {
        e.alive = false;
        e.squish = 5; // squish animation frames
        player.vy = -10;
        score += 200;
        playSound('stomp');
        screenShake = 3;
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 8);
      } else {
        playerHit();
      }
    }
  }
}

function playerHit() {
  if (gameMode === 2) return; // Invincible mode: no effect at all
  player.invincible = 90;
  player.vy = -8;
  player.vx = player.facing * -5;
  screenShake = 6;
  playSound('hit');
  if (gameMode === 1) {
    // Assist: knockback and flash but no damage
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 5);
    return;
  }
  lives--;
  if (lives <= 0) {
    player.dead = true;
    player.vy = -12;
  }
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ffffff', 5);
}

// ============================================================
// BOSS UPDATE
// ============================================================
function updateBoss() {
  if (!boss || !boss.alive) return;

  boss.animTimer++;
  if (boss.hitFlash > 0) boss.hitFlash--;

  // Movement — pace back and forth
  boss.x += boss.vx;
  if (boss.x < boss.startX - boss.patrol || boss.x > boss.startX + boss.patrol) {
    boss.vx *= -1;
  }

  // Attack — throw projectiles
  boss.attackTimer++;
  if (boss.attackTimer >= boss.attackCooldown) {
    boss.attackTimer = 0;
    fireBossProjectile();
  }

  // Enrage at low HP — faster movement and attacks
  if (boss.hp <= Math.ceil(boss.maxHP / 2) && boss.phase === 1) {
    boss.phase = 2;
    boss.vx *= 1.5;
    boss.attackCooldown = Math.max(40, boss.attackCooldown - 30);
  }

  // Collision with player
  if (!player.dead && rectsOverlap(player, boss)) {
    if (gameMode === 2) {
      // Invincible mode: any contact damages boss (with cooldown via hitFlash)
      if (boss.hitFlash <= 0) {
        boss.hp--;
        boss.hitFlash = 30;
        player.vy = -6;
        score += 500;
        playSound('bossstomp');
        screenShake = 8;
        spawnParticles(boss.x + boss.w / 2, boss.y + 10, '#FFD700', 10);
        if (boss.hp <= 0) {
          boss.alive = false;
          score += 2000;
          playSound('bossdefeat');
          screenShake = 15;
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#C41230', 20);
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#FFD700', 20);
          gameState = 'bossDefeated';
          levelIntroTimer = 180;
        }
      }
    } else if (player.invincible <= 0) {
      if (player.vy > 0 && player.y + player.h - 16 < boss.y + boss.h / 2) {
        // Stomp boss
        boss.hp--;
        boss.hitFlash = 15;
        player.vy = -12;
        score += 500;
        playSound('bossstomp');
        screenShake = 8;
        spawnParticles(boss.x + boss.w / 2, boss.y + 10, '#FFD700', 10);
        if (boss.hp <= 0) {
          boss.alive = false;
          score += 2000;
          playSound('bossdefeat');
          screenShake = 15;
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#C41230', 20);
          spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#FFD700', 20);
          gameState = 'bossDefeated';
          levelIntroTimer = 180;
        }
      } else {
        playerHit();
      }
    }
  }
}

function fireBossProjectile() {
  const dx = player.x - boss.x;
  const dy = player.y - boss.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  const speed = 3 + currentLevel * 0.5;

  bossProjectiles.push({
    x: boss.x + boss.w / 2,
    y: boss.y + boss.h / 2,
    vx: (dx / dist) * speed,
    vy: (dy / dist) * speed,
    w: 24, h: 24,
    life: 200,
    type: currentLevel, // different projectile per boss
  });

  // Mike Trick fires extra projectiles
  if (currentLevel === 3 && boss.phase === 2) {
    bossProjectiles.push({
      x: boss.x + boss.w / 2,
      y: boss.y + boss.h / 2,
      vx: (dx / dist) * speed + 1,
      vy: (dy / dist) * speed - 1,
      w: 24, h: 24,
      life: 200,
      type: currentLevel,
    });
  }
}

function updateBossProjectiles() {
  for (let i = bossProjectiles.length - 1; i >= 0; i--) {
    const p = bossProjectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) { bossProjectiles.splice(i, 1); continue; }

    // Hit player
    if (!player.dead && player.invincible <= 0 && rectsOverlap(player, p)) {
      playerHit();
      bossProjectiles.splice(i, 1);
    }
  }
}

// ============================================================
// COLLECTIBLES & PARTICLES
// ============================================================
function updateCollectibles() {
  for (const c of collectibles) {
    if (c.collected) continue;
    c.bobOffset += 0.05;
    if (!player.dead && rectsOverlap(player, { x: c.x, y: c.y + Math.sin(c.bobOffset) * 3, w: c.w, h: c.h })) {
      c.collected = true;
      score += 100;
      playSound('coin');
      spawnParticles(c.x + c.w / 2, c.y + c.h / 2, '#FFD700', 6);
    }
  }
}

function updateHealthPickups() {
  for (const h of healthPickups) {
    if (h.collected) continue;
    h.bobOffset += 0.04;
    if (!player.dead && rectsOverlap(player, { x: h.x, y: h.y + Math.sin(h.bobOffset) * 4, w: h.w, h: h.h })) {
      h.collected = true;
      lives = Math.min(lives + 2, 7);
      score += 250;
      playSound('health');
      spawnParticles(h.x + h.w / 2, h.y + h.h / 2, '#C41230', 10);
      spawnParticles(h.x + h.w / 2, h.y + h.h / 2, '#FFD700', 10);
    }
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 3,
      life: 30 + Math.random() * 20,
      color,
      size: 4 + Math.random() * 6,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera() {
  const targetX = player.x - W / 3;
  camera.x += (targetX - camera.x) * 0.1;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > LEVEL_W * T - W) camera.x = LEVEL_W * T - W;
}

// ============================================================
// DRAWING — ENEMIES & COLLECTIBLES
// ============================================================
function drawEnemy(e) {
  // Squish animation for stomped enemies
  if (e.squish > 0) {
    e.squish--;
    const x = e.x - camera.x;
    const y = e.y;
    ctx.save();
    ctx.translate(x + e.w / 2, y + e.h);
    ctx.scale(2 + (5 - e.squish) * 0.3, 0.3);
    ctx.translate(-(e.w / 2), -(e.h));
    ctx.fillStyle = '#888';
    ctx.fillRect(0, 0, 28, 28);
    ctx.restore();
    return;
  }
  if (!e.alive) return;
  const x = e.x - camera.x;
  const y = e.y;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(2, 2);

  if (e.type === 'deadline') {
    // Deadline alarm clock — hops around
    const shake = Math.sin(e.animTimer * 0.3) * 1.5;
    // Clock body (red)
    ctx.fillStyle = '#C41230';
    ctx.beginPath();
    ctx.arc(14, 16 + shake, 12, 0, Math.PI * 2);
    ctx.fill();
    // Clock face
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(14, 16 + shake, 9, 0, Math.PI * 2);
    ctx.fill();
    // Clock hands
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    const handAngle = e.animTimer * 0.05;
    ctx.beginPath();
    ctx.moveTo(14, 16 + shake);
    ctx.lineTo(14 + Math.cos(handAngle) * 6, 16 + shake + Math.sin(handAngle) * 6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(14, 16 + shake);
    ctx.lineTo(14 + Math.cos(handAngle * 3) * 4, 16 + shake + Math.sin(handAngle * 3) * 4);
    ctx.stroke();
    // Angry eyes on clock face
    ctx.fillStyle = '#C41230';
    ctx.fillRect(10, 13 + shake, 3, 3);
    ctx.fillRect(16, 13 + shake, 3, 3);
    // Alarm bells on top
    ctx.fillStyle = '#DAA520';
    ctx.beginPath();
    ctx.arc(7, 5 + shake, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(21, 5 + shake, 4, 0, Math.PI * 2);
    ctx.fill();
    // Hammer between bells
    ctx.fillStyle = '#888';
    ctx.fillRect(13, 2 + shake, 2, 4);
    // Legs
    ctx.fillStyle = '#C41230';
    const legAnim = Math.sin(e.animTimer * 0.2) * 2;
    ctx.fillRect(8, 27 + legAnim, 3, 4);
    ctx.fillRect(17, 27 - legAnim, 3, 4);
    // "DUE!" text
    ctx.fillStyle = '#C41230';
    ctx.font = 'bold 5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DUE!', 14, 22 + shake);
    ctx.textAlign = 'left';
  } else {
    // Professor with red pen — walks back and forth marking F's
    const walk = Math.sin(e.animTimer * 0.15) * 1;
    const facing = e.vx > 0 ? 1 : -1;
    ctx.save();
    ctx.translate(14, 14);
    ctx.scale(facing, 1);
    ctx.translate(-14, -14);
    // Body (tweed jacket)
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(6, 12 + walk, 16, 14);
    // Head
    ctx.fillStyle = '#d4a574';
    ctx.fillRect(8, 1 + walk, 12, 12);
    // Angry eyebrows
    ctx.fillStyle = '#333';
    ctx.fillRect(9, 3 + walk, 4, 2);
    ctx.fillRect(15, 3 + walk, 4, 2);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(10, 5 + walk, 3, 3);
    ctx.fillRect(16, 5 + walk, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(11, 6 + walk, 2, 2);
    ctx.fillRect(17, 6 + walk, 2, 2);
    // Frown
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(11, 10 + walk, 6, 1);
    // Glasses
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(9, 4 + walk, 5, 5);
    ctx.strokeRect(15, 4 + walk, 5, 5);
    ctx.fillStyle = '#555';
    ctx.fillRect(14, 6 + walk, 1, 1);
    // Hair (messy professor)
    ctx.fillStyle = '#777';
    ctx.fillRect(8, 0 + walk, 12, 3);
    ctx.fillRect(7, 1 + walk, 2, 4);
    ctx.fillRect(19, 1 + walk, 2, 4);
    // Red pen in hand
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(22, 14 + walk, 2, 10);
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(22, 23 + walk, 2, 3);

    ctx.fillRect(8, 25 + legOff, 5, 5);

}

function drawCollectible(c) {
  if (c.collected) return;
  const x = c.x - camera.x;
  const y = c.y + Math.sin(c.bobOffset) * 5;

  // Spinning coin effect — squish horizontally
  const spin = Math.abs(Math.cos(frameCount * 0.06 + c.bobOffset));
  const coinW = 20 * spin; // width squishes as it "spins"

  ctx.save();
  ctx.translate(x + 24, y + 24);
  ctx.scale(2, 2);

  // Coin body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, coinW / 2, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Dark edge
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, coinW / 2, 11, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Inner circle
  if (spin > 0.3) {
    ctx.fillStyle = '#C41230';
    ctx.beginPath();
    ctx.ellipse(0, 0, coinW / 2 - 2, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Themed Scotty silhouette (only when coin faces forward enough)
    if (spin > 0.5) {
      ctx.fillStyle = '#1a1a1a';
      const sw = coinW / 20; // scale with spin
      if (currentLevel === 0) {
        // Doha: Scotty with keffiyeh — head + small triangle cloth
        ctx.fillRect(-3 * sw, -4, 6 * sw, 5); // head
        ctx.fillRect(-2 * sw, 1, 4 * sw, 3);  // body
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4 * sw, -5, 8 * sw, 2); // keffiyeh band
        ctx.fillRect(-3 * sw, -6, 2 * sw, 2); // keffiyeh drape
      } else if (currentLevel === 1) {
        // Rwanda: Scotty with drum
        ctx.fillRect(-3 * sw, -4, 5 * sw, 5); // head
        ctx.fillRect(-2 * sw, 1, 4 * sw, 3);  // body
        ctx.fillStyle = '#DAA520';
        ctx.fillRect(1 * sw, 0, 3 * sw, 4);   // drum
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(1 * sw, -1, 3 * sw, 1);  // drum top
      } else if (currentLevel === 2) {
        // Silicon Valley: Scotty with laptop
        ctx.fillRect(-3 * sw, -4, 5 * sw, 5); // head
        ctx.fillRect(-2 * sw, 1, 4 * sw, 3);  // body
        ctx.fillStyle = '#aaa';
        ctx.fillRect(-1 * sw, 2, 5 * sw, 2);  // laptop base
        ctx.fillStyle = '#6af';
        ctx.fillRect(-1 * sw, 0, 5 * sw, 2);  // laptop screen
      } else {
        // Pittsburgh: Scotty with hard hat
        ctx.fillRect(-3 * sw, -3, 5 * sw, 5); // head
        ctx.fillRect(-2 * sw, 2, 4 * sw, 3);  // body
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(-4 * sw, -5, 8 * sw, 3); // hard hat
        ctx.fillRect(-3 * sw, -6, 6 * sw, 2); // hat dome
      }
    }
  }

  ctx.restore();
}

// CMU Shield — health pickup (+2 lives)
function drawHealthPickup(h) {
  if (h.collected) return;
  const x = h.x - camera.x;
  const y = h.y + Math.sin(h.bobOffset) * 4;
  const glow = Math.sin(frameCount * 0.08) * 0.3 + 0.7;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(2, 2);

  // Glow effect
  ctx.globalAlpha = glow * 0.3;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(12, 12, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Shield shape — pointed bottom
  ctx.fillStyle = '#C41230';
  ctx.beginPath();
  ctx.moveTo(2, 2);
  ctx.lineTo(22, 2);
  ctx.lineTo(22, 14);
  ctx.lineTo(12, 23);
  ctx.lineTo(2, 14);
  ctx.closePath();
  ctx.fill();

  // Inner shield
  ctx.fillStyle = '#8a0a20';
  ctx.beginPath();
  ctx.moveTo(5, 5);
  ctx.lineTo(19, 5);
  ctx.lineTo(19, 13);
  ctx.lineTo(12, 20);
  ctx.lineTo(5, 13);
  ctx.closePath();
  ctx.fill();

  // Gold border
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(2, 2);
  ctx.lineTo(22, 2);
  ctx.lineTo(22, 14);
  ctx.lineTo(12, 23);
  ctx.lineTo(2, 14);
  ctx.closePath();
  ctx.stroke();

  // CMU text
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CMU', 12, 11);
  ctx.textAlign = 'left';

  // + heart symbol
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 5px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('+2', 12, 17);
  ctx.textAlign = 'left';

  ctx.restore();
}

// ============================================================
// DRAWING — TILES, GOAL, HUD
// ============================================================
function drawTiles() {
  const startCol = Math.floor(camera.x / T);
  const endCol = Math.min(startCol + Math.ceil(W / T) + 2, LEVEL_W);

  // Tile colors per level
  const groundColors = [
    { main: '#5a5a6a', top: '#3a6b35', edge: '#4a4a5a', stroke: '#3a3a4a' }, // Doha — gray stone
    { main: '#5a3a2a', top: '#2d6b2d', edge: '#4a3020', stroke: '#3a2a1a' }, // Rwanda — red earth
    { main: '#4a4a5a', top: '#3a5a3a', edge: '#3a3a4a', stroke: '#2a2a3a' }, // SV — modern gray
    { main: '#5a5a5a', top: '#4a5a3a', edge: '#4a4a4a', stroke: '#3a3a3a' }, // Pittsburgh — steel gray
  ];
  const brickColors = [
    { main: '#6b4c3b', inner: '#7d5a47' },
    { main: '#5a3a1a', inner: '#6b4a2a' },
    { main: '#3a3a5a', inner: '#4a4a6a' },
    { main: '#5a4a3a', inner: '#6b5a4a' },
  ];
  const gc = groundColors[currentLevel];
  const bc = brickColors[currentLevel];

  for (let r = 0; r < LEVEL_H; r++) {
    for (let c = startCol; c < endCol; c++) {
      const tile = level[r][c];
      if (tile === 0) continue;
      const x = c * T - camera.x;
      const y = r * T;

      if (tile === 1) {
        ctx.fillStyle = gc.main;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = gc.edge;
        ctx.fillRect(x, y, T, 2);
        ctx.strokeStyle = gc.stroke;
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 0.5, y + 0.5, T - 1, T - 1);
        if (r > 0 && level[r - 1][c] !== 1) {
          ctx.fillStyle = gc.top;
          ctx.fillRect(x, y, T, 3);
        }
      } else if (tile === 2) {
        ctx.fillStyle = bc.main;
        ctx.fillRect(x, y, T, T);
        ctx.fillStyle = bc.inner;
        ctx.fillRect(x + 1, y + 1, T - 2, T - 2);
        ctx.fillStyle = bc.main;
        ctx.fillRect(x + T / 2, y, 1, T);
        ctx.fillRect(x, y + T / 2, T, 1);
      }
    }
  }
}

function drawGoal() {
  if (gameState === 'bossFight' || gameState === 'bossDefeated') return;
  const x = goalX - camera.x;
  ctx.save();
  ctx.translate(x, H - 14 * T);
  ctx.scale(2, 2);
  const oY = 40;
  ctx.fillStyle = '#ccc';
  ctx.fillRect(14, oY, 4, 14 * 32 / 2 - oY);
  ctx.fillStyle = '#C41230';
  ctx.fillRect(18, oY + 2, 30, 20);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('CMU', 21, oY + 17);
  ctx.fillStyle = '#222';
  ctx.fillRect(6, oY - 8, 20, 4);
  ctx.fillRect(10, oY - 12, 12, 6);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(6, oY - 8, 2, 10);
  ctx.fillRect(3, oY, 6, 3);
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 60);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('SCORE: ' + String(score).padStart(6, '0'), 20, 40);

  // Level name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  const info = levelInfo[currentLevel];
  ctx.fillText('Level ' + (currentLevel + 1) + ': ' + info.name, W / 2, 25);
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText(info.subtitle, W / 2, 48);
  ctx.textAlign = 'left';

  // Lives
  for (let i = 0; i < lives; i++) {
    drawScottyHead(W - 55 - i * 45, 12, 36);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - camera.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SCREENS
// ============================================================
function drawTitle() {
  currentLevel = 0;
  drawBG_Doha();

  ctx.fillStyle = '#C41230';
  ctx.font = 'bold 80px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCOTTY RUN', W / 2, H / 2 - 150);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('A CMU Global Adventure', W / 2, H / 2 - 90);

  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.fillText('Doha \u2022 Kigali \u2022 Silicon Valley \u2022 Pittsburgh', W / 2, H / 2 - 55);

  drawScotty(W / 2 - 24, H / 2 - 20, 1, Math.floor(frameCount / 15) % 2, 0);

  // Mode selection — 3 boxes, arrow keys to choose
  const modes = [
    { name: 'Normal', desc: 'Full challenge', desc2: 'Earn letter grades', color: '#FFD700', bg: 'rgba(50,50,80,' },
    { name: 'Assist', desc: 'Can\'t die, knockback', desc2: 'Max grade: C', color: '#4a9', bg: 'rgba(50,80,50,' },
    { name: 'Invincible', desc: 'Shield + float', desc2: 'Grade: Pass', color: '#88f', bg: 'rgba(50,50,100,' },
  ];
  const boxW = 230;
  const boxH = 70;
  const gap = 20;
  const totalW = modes.length * boxW + (modes.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const boxY = H / 2 + 45;

  for (let i = 0; i < modes.length; i++) {
    const m = modes[i];
    const bx = startX + i * (boxW + gap);
    const sel = titleSelection === i;

    // Box background
    ctx.fillStyle = m.bg + (sel ? '0.9)' : '0.4)');
    ctx.fillRect(bx, boxY, boxW, boxH);

    // Border
    ctx.strokeStyle = sel ? m.color : '#555';
    ctx.lineWidth = sel ? 3 : 1;
    ctx.strokeRect(bx, boxY, boxW, boxH);

    // Selection arrow
    if (sel) {
      ctx.fillStyle = m.color;
      ctx.font = 'bold 20px monospace';
      ctx.fillText('\u25B6', bx + 12, boxY + 30);
    }

    // Mode name
    ctx.fillStyle = sel ? m.color : '#888';
    ctx.font = 'bold 22px monospace';
    ctx.fillText(m.name, bx + boxW / 2, boxY + 28);

    // Description
    ctx.fillStyle = sel ? '#ccc' : '#666';
    ctx.font = '12px monospace';
    ctx.fillText(m.desc, bx + boxW / 2, boxY + 47);
    ctx.fillText(m.desc2, bx + boxW / 2, boxY + 62);
  }

  // Arrow hint
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('\u2190 \u2192 Select Mode', W / 2, boxY + boxH + 25);

  // Start prompt
  const blink = Math.sin(frameCount * 0.06) > 0;
  ctx.font = '24px monospace';
  ctx.fillStyle = '#fff';
  if (blink) ctx.fillText('Press SPACE to Start', W / 2, boxY + boxH + 60);

  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('Controls: \u2190 \u2192 Move   SPACE Jump (x2 Double Jump!)', W / 2, boxY + boxH + 90);
  ctx.fillText('Stomp enemies & bosses! Collect Scotty coins!', W / 2, boxY + boxH + 112);

  ctx.textAlign = 'left';
}

function drawLevelIntro() {
  drawBackground();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  const info = levelInfo[currentLevel];
  ctx.textAlign = 'center';

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('Level ' + (currentLevel + 1), W / 2, H / 2 - 80);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 44px monospace';
  ctx.fillText(info.name, W / 2, H / 2 - 10);

  ctx.fillStyle = '#C41230';
  ctx.font = '28px monospace';
  ctx.fillText(info.subtitle, W / 2, H / 2 + 35);

  if (info.boss) {
    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 26px monospace';
    ctx.fillText('BOSS: ' + info.boss, W / 2, H / 2 + 90);
    ctx.fillStyle = '#aaa';
    ctx.font = '22px monospace';
    ctx.fillText(info.bossTitle, W / 2, H / 2 + 125);
  }

  ctx.textAlign = 'left';
}

function drawBossDefeated() {
  drawBackground();
  drawTiles();
  drawParticles();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  if (usedPassNoPass[currentLevel]) {
    ctx.fillStyle = '#4a9';
    ctx.font = 'bold 56px monospace';
    ctx.fillText(boss ? boss.name + ' — PASSED!' : 'PASSED!', W / 2, H / 2 - 30);
    ctx.fillStyle = '#aaa';
    ctx.font = '24px monospace';
    ctx.fillText('(Pass/No-Pass elected)', W / 2, H / 2 + 10);
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 56px monospace';
    ctx.fillText(boss ? boss.name + ' DEFEATED!' : 'BOSS DEFEATED!', W / 2, H / 2 - 30);
  }

  ctx.fillStyle = '#fff';
  ctx.font = '28px monospace';
  if (currentLevel < 3) {
    ctx.fillText('Advancing to ' + levelInfo[currentLevel + 1].name + '...', W / 2, H / 2 + 50);
  } else {
    ctx.fillText('You conquered all CMU campuses!', W / 2, H / 2 + 50);
  }
  ctx.textAlign = 'left';
}

function drawPassNoPass() {
  drawBackground();
  drawTiles();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  const bossName = boss ? boss.name : 'the boss';

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 48px monospace';
  ctx.fillText('ACADEMIC OPTIONS', W / 2, H / 2 - 140);

  ctx.fillStyle = '#ff6666';
  ctx.font = '24px monospace';
  ctx.fillText(bossName + ' is tough! You\'ve died ' + bossDeathCount + ' time(s).', W / 2, H / 2 - 80);

  // Option box styling
  ctx.fillStyle = 'rgba(50,50,80,0.8)';
  ctx.fillRect(W / 2 - 350, H / 2 - 50, 320, 120);
  ctx.fillRect(W / 2 + 30, H / 2 - 50, 320, 120);
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.strokeRect(W / 2 - 350, H / 2 - 50, 320, 120);
  ctx.strokeStyle = '#4a9';
  ctx.strokeRect(W / 2 + 30, H / 2 - 50, 320, 120);

  // Option 1: Keep fighting
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('[SPACE] Fight On!', W / 2 - 190, H / 2 - 10);
  ctx.fillStyle = '#ccc';
  ctx.font = '18px monospace';
  ctx.fillText('Keep your letter grade', W / 2 - 190, H / 2 + 25);
  ctx.fillText('Lives restored to 3', W / 2 - 190, H / 2 + 50);

  // Option 2: Pass/No-Pass
  ctx.fillStyle = '#4a9';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('[P] Pass/No-Pass', W / 2 + 190, H / 2 - 10);
  ctx.fillStyle = '#ccc';
  ctx.font = '18px monospace';
  ctx.fillText('Skip this boss fight', W / 2 + 190, H / 2 + 25);
  ctx.fillText('Max grade becomes P', W / 2 + 190, H / 2 + 50);

  // Warning
  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('Taking P/NP on any level caps your final grade at "Pass"', W / 2, H / 2 + 120);

  ctx.textAlign = 'left';
}

function calculateGrade() {
  const tookPNP = usedPassNoPass.some(v => v);
  if (tookPNP) return { letter: 'P', label: 'Pass', color: '#4a9' };

  // Grade based on score and remaining lives
  const totalCollectibles = allLevelData.reduce((sum, lvl) => {
    return sum + lvl.join('').split('').filter(c => c === '3').length;
  }, 0);
  const maxScore = totalCollectibles * 100 + 4 * 2000 + 20 * 200 + 3 * 500 * 5;
  const pct = score / Math.max(maxScore, 1);

  // Assist mode caps grade at C
  if (gameMode === 1) {
    if (pct >= 0.25) return { letter: 'C', label: 'Satisfactory (Assist Mode)', color: '#ccc' };
    return { letter: 'D', label: 'Academic Probation', color: '#ff6666' };
  }
  // Invincible mode — just a Pass
  if (gameMode === 2) {
    return { letter: 'P', label: 'Pass (Invincible Mode)', color: '#88f' };
  }

  if (pct >= 0.9 && lives >= 4) return { letter: 'A+', label: 'Summa Cum Laude', color: '#FFD700' };
  if (pct >= 0.8) return { letter: 'A', label: 'Magna Cum Laude', color: '#FFD700' };
  if (pct >= 0.7) return { letter: 'B+', label: 'Cum Laude', color: '#aaa' };
  if (pct >= 0.55) return { letter: 'B', label: 'Dean\'s List', color: '#aaa' };
  if (pct >= 0.4) return { letter: 'C+', label: 'Good Standing', color: '#ccc' };
  if (pct >= 0.25) return { letter: 'C', label: 'Satisfactory', color: '#ccc' };
  return { letter: 'D', label: 'Academic Probation', color: '#ff6666' };
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#C41230';
  ctx.font = 'bold 72px monospace';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 50);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('Score: ' + score, W / 2, H / 2 + 20);

  ctx.fillStyle = '#888';
  ctx.font = '24px monospace';
  ctx.fillText('Reached: ' + levelInfo[currentLevel].name, W / 2, H / 2 + 65);

  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  const blink = Math.sin(frameCount * 0.06) > 0;
  if (blink) ctx.fillText('Press SPACE to Retry', W / 2, H / 2 + 110);
  ctx.textAlign = 'left';
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  // Graduation cap
  ctx.fillStyle = '#222';
  ctx.fillRect(W / 2 - 60, H / 2 - 220, 120, 16);
  ctx.fillRect(W / 2 - 40, H / 2 - 240, 80, 28);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(W / 2 - 60, H / 2 - 220, 4, 30);
  ctx.fillRect(W / 2 - 68, H / 2 - 194, 20, 8);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 64px monospace';
  ctx.fillText('GRADUATED!', W / 2, H / 2 - 100);

  const grade = calculateGrade();

  // Grade display
  ctx.fillStyle = grade.color;
  ctx.font = 'bold 80px monospace';
  ctx.fillText(grade.letter, W / 2, H / 2 + 10);
  ctx.font = 'bold 24px monospace';
  ctx.fillText(grade.label, W / 2, H / 2 + 45);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('Final Score: ' + score, W / 2, H / 2 + 90);

  // Show P/NP usage per level
  ctx.font = '18px monospace';
  const levelMarks = levelInfo.map((info, i) => {
    if (i === 0) return info.name + ' \u2713';
    return info.name + (usedPassNoPass[i] ? ' (P/NP)' : ' \u2713');
  }).join('  ');
  ctx.fillStyle = '#888';
  ctx.fillText(levelMarks, W / 2, H / 2 + 130);

  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  const blink = Math.sin(frameCount * 0.06) > 0;
  if (blink) ctx.fillText('Press SPACE to Play Again', W / 2, H / 2 + 180);
  ctx.textAlign = 'left';

  // Confetti
  if (frameCount % 5 === 0) {
    const colors = ['#C41230', '#FFD700', '#fff', '#00e676'];
    spawnParticles(Math.random() * W + camera.x, 0, colors[Math.floor(Math.random() * colors.length)], 2);
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function resetGame() {
  score = 0;
  lives = 5;
  camera.x = 0;
  currentLevel = 0;
  usedPassNoPass = [false, false, false, false];
  bossDeathCount = 0;
  startLevel(0);
}

function update() {
  frameCount++;

  if (gameState === 'title') {
    if (keys['ArrowLeft']) { titleSelection = Math.max(0, titleSelection - 1); keys['ArrowLeft'] = false; }
    if (keys['ArrowRight']) { titleSelection = Math.min(2, titleSelection + 1); keys['ArrowRight'] = false; }
    if (keys['Space']) {
      initAudio();
      gameMode = titleSelection;
      resetGame();
      keys['Space'] = false;
    }
  } else if (gameState === 'levelIntro') {
    levelIntroTimer--;
    if (levelIntroTimer <= 0 || keys['Space']) {
      gameState = 'playing';
      keys['Space'] = false;
    }
  } else if (gameState === 'playing') {
    updatePlayer();
    updateEnemies();
    updateCollectibles();
    updateHealthPickups();
    updateParticles();
    updateCamera();
  } else if (gameState === 'bossEntrance') {
    levelIntroTimer--;
    updateCamera();
    if (levelIntroTimer <= 0) {
      gameState = 'bossFight';
    }
  } else if (gameState === 'bossFight') {
    updatePlayer();
    updateEnemies();
    updateBoss();
    updateBossProjectiles();
    updateCollectibles();
    updateHealthPickups();
    updateParticles();
    updateCamera();
  } else if (gameState === 'passNoPass') {
    // Waiting for player choice
    if (keys['Space']) {
      // Fight on — restore lives
      lives = 3;
      bossDeathCount = 0;
      gameState = 'bossFight';
      resetPlayer();
      keys['Space'] = false;
    } else if (keys['KeyP']) {
      // Take Pass/No-Pass — skip boss
      usedPassNoPass[currentLevel] = true;
      if (boss) boss.alive = false;
      score += 500; // consolation points
      spawnParticles(W / 2, H / 2, '#4a9', 15);
      gameState = 'bossDefeated';
      levelIntroTimer = 150;
      lives = Math.max(lives, 3);
      keys['KeyP'] = false;
    }
  } else if (gameState === 'bossDefeated') {
    updateParticles();
    levelIntroTimer--;
    if (levelIntroTimer <= 0) {
      advanceLevel();
    }
  } else if (gameState === 'gameover' || gameState === 'victory') {
    updateParticles();
    if (keys['Space']) {
      gameState = 'title';
      keys['Space'] = false;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Screen shake
  if (screenShake > 0) {
    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
    screenShake--;
    ctx.save();
    ctx.translate(screenShakeX, screenShakeY);
  }

  if (gameState === 'title') {
    drawTitle();
  } else if (gameState === 'levelIntro') {
    drawLevelIntro();
  } else if (gameState === 'bossEntrance') {
    drawBackground();
    drawTiles();
    drawGoal();
    for (const c of collectibles) drawCollectible(c);
    for (const h of healthPickups) drawHealthPickup(h);
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawScotty(player.x - camera.x, player.y, player.facing, player.animFrame, player.invincible);
    drawHUD();
    // Dramatic overlay
    const fade = Math.min(1, levelIntroTimer / 60);
    ctx.fillStyle = `rgba(0,0,0,${fade * 0.6})`;
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('WARNING', W / 2, H / 2 - 50);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.fillText(boss ? boss.name : 'BOSS', W / 2, H / 2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '22px monospace';
    ctx.fillText(boss ? boss.title : '', W / 2, H / 2 + 45);
    ctx.textAlign = 'left';
  } else if (gameState === 'playing' || gameState === 'bossFight') {
    drawBackground();
    drawTiles();
    drawGoal();
    for (const c of collectibles) drawCollectible(c);
    for (const h of healthPickups) drawHealthPickup(h);
    for (const e of enemies) drawEnemy(e);
    if (gameState === 'bossFight') {
      drawBoss();
      for (const p of bossProjectiles) drawBossProjectile(p);
    }
    // Shield glow for invincible mode (behind player)
    if (gameMode === 2) {
      const sx = player.x - camera.x + player.w / 2;
      const sy = player.y + player.h / 2;
      const pulse = Math.sin(frameCount * 0.1) * 0.15 + 0.35;
      // Outer glow
      ctx.fillStyle = `rgba(100, 150, 255, ${pulse * 0.3})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 50, 0, Math.PI * 2);
      ctx.fill();
      // Inner shield
      ctx.strokeStyle = `rgba(150, 200, 255, ${pulse + 0.3})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sx, sy, 38, 0, Math.PI * 2);
      ctx.stroke();
      // Shield shimmer
      ctx.strokeStyle = `rgba(255, 255, 255, ${pulse * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(sx, sy, 42, -0.5 + frameCount * 0.05, 0.5 + frameCount * 0.05);
      ctx.stroke();
    }
    // Player — spin if dead
    if (player.dead) {
      ctx.save();
      const px = player.x - camera.x + player.w / 2;
      const py = player.y + player.h / 2;
      ctx.translate(px, py);
      ctx.rotate(player.deadTimer * 0.15);
      ctx.translate(-px, -py);
      drawScotty(player.x - camera.x, player.y, player.facing, player.animFrame, player.invincible);
      ctx.restore();
    } else {
      drawScotty(player.x - camera.x, player.y, player.facing, player.animFrame, player.invincible);
    }
    drawParticles();
    drawHUD();
    // Mode indicator
    if (gameMode === 1) {
      ctx.fillStyle = 'rgba(74, 153, 100, 0.6)';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('ASSIST MODE', W - 20, H - 20);
      ctx.textAlign = 'left';
    } else if (gameMode === 2) {
      ctx.fillStyle = 'rgba(100, 100, 255, 0.6)';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'right';
      ctx.fillText('INVINCIBLE', W - 20, H - 20);
      ctx.textAlign = 'left';
    }
  } else if (gameState === 'passNoPass') {
    drawPassNoPass();
  } else if (gameState === 'bossDefeated') {
    drawBossDefeated();
  } else if (gameState === 'gameover') {
    drawBackground();
    drawTiles();
    drawParticles();
    drawHUD();
    drawGameOver();
  } else if (gameState === 'victory') {
    drawBackground();
    drawTiles();
    drawParticles();
    drawHUD();
    drawVictory();
  }

  if (screenShakeX !== 0 || screenShakeY !== 0) {
    ctx.restore();
    if (screenShake <= 0) { screenShakeX = 0; screenShakeY = 0; }
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Initialize and start
loadLevel(0);
initEntities();
resetPlayer();
gameLoop();
</script>
